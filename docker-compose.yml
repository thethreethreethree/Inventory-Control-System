services:
  db:
    image: postgres:16
    container_name: ics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ics
      POSTGRES_PASSWORD: ics_dev_password
      POSTGRES_DB: ics
    ports:
      - "5432:5432"
    volumes:
      - ics-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ics -d ics"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  ics-pgdata:
